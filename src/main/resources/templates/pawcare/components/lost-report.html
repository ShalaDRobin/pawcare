<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signaler un animal perdu - PawCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pawcare-style.css}">
    <style>
        .report-container {
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 0 30px;
        }
        .report-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
        }
        .report-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .report-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--forest);
        }
        .form-group label .required {
            color: var(--terracotta);
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn-primary {
            background: var(--terracotta);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            flex: 2;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--terracotta);
            color: var(--terracotta);
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            text-align: center;
            text-decoration: none;
        }
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area.dragover {
            border-color: var(--terracotta);
            background: rgba(196,107,63,0.05);
        }
        .image-preview {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .preview-image {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .preview-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        .preview-image .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--terracotta);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 12px;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--forest);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
<div th:replace="~{pawcare/fragments/navbar :: navbar}"></div>

<div class="report-container">
    <a href="/" class="back-button">← Retour à l'accueil</a>

    <div class="report-card">
        <div class="report-header">
            <h1>🐾 Signaler un animal perdu</h1>
            <p>Remplissez ce formulaire pour alerter la communauté</p>
        </div>

        <form id="lostReportForm" th:action="@{/perdus/report}" method="post" enctype="multipart/form-data">
            <!-- Informations de base -->
            <div class="form-row">
                <div class="form-group">
                    <label>Titre du signalement *</label>
                    <input type="text" name="title" placeholder="Ex: Chien perdu - Quartier Anfa" required>
                </div>
                <div class="form-group">
                    <label>Type d'animal *</label>
                    <select name="animalType" required>
                        <option value="">Sélectionnez</option>
                        <option value="Chien">🐕 Chien</option>
                        <option value="Chat">🐈 Chat</option>
                        <option value="Lapin">🐇 Lapin</option>
                        <option value="Oiseau">🦜 Oiseau</option>
                        <option value="Autre">🐾 Autre</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Nom de l'animal</label>
                    <input type="text" name="name" placeholder="Nom (si connu)">
                </div>
                <div class="form-group">
                    <label>Race</label>
                    <input type="text" name="breed" placeholder="Race">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Âge</label>
                    <input type="number" name="age" placeholder="Âge en années" min="0" step="0.5">
                </div>
                <div class="form-group">
                    <label>Sexe</label>
                    <select name="gender">
                        <option value="">Non spécifié</option>
                        <option value="Mâle">Mâle</option>
                        <option value="Femelle">Femelle</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Couleur(s)</label>
                    <input type="text" name="color" placeholder="Ex: Roux, blanc, noir...">
                </div>
                <div class="form-group">
                    <label>Signes distinctifs</label>
                    <input type="text" name="distinctFeatures" placeholder="Collier, cicatrice, etc.">
                </div>
            </div>

            <!-- Lieu et date -->
            <div class="form-row">
                <div class="form-group">
                    <label>Lieu de disparition *</label>
                    <input type="text" name="lastSeenLocation" placeholder="Quartier, ville..." required>
                </div>
                <div class="form-group">
                    <label>Date de disparition *</label>
                    <input type="date" name="lastSeenDate" required>
                </div>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label>Description *</label>
                <textarea name="description" rows="4" placeholder="Décrivez l'animal, son comportement, les circonstances de la disparition..." required></textarea>
            </div>

            <!-- Puce électronique -->
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" name="hasChip" value="true">
                    L'animal a une puce électronique
                </label>
            </div>
            <div class="form-group" id="chipNumberField" style="display: none;">
                <label>Numéro de puce</label>
                <input type="text" name="chipNumber" placeholder="Numéro à 15 chiffres">
            </div>

            <!-- Contact -->
            <div class="form-row">
                <div class="form-group">
                    <label>Téléphone de contact *</label>
                    <input type="tel" name="ownerPhone" placeholder="0612345678 ou +212612345678" required>
                </div>
                <div class="form-group">
                    <label>Email de contact</label>
                    <input type="email" name="ownerEmail" placeholder="email@exemple.com">
                </div>
            </div>

            <!-- Photo -->
            <div class="form-group">
                <label>Photo de l'animal</label>
                <div class="upload-area" id="lostUploadArea">
                    <div style="font-size: 3rem; margin-bottom: 10px;">📸</div>
                    <p>Cliquez ou glissez-déposez une photo ici</p>
                    <p style="font-size: 0.8rem; color: var(--text-light);">Format: JPG, PNG (max 5 Mo)</p>
                    <input type="file" name="images" id="lostImageUpload" accept="image/*" multiple style="display: none;">
                </div>
                <div id="lostImagePreview" class="image-preview"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">📢 Publier le signalement</button>
                <a href="/" class="btn-outline">Annuler</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{pawcare/fragments/footer :: footer}"></div>
<div th:replace="~{pawcare/fragments/toast :: toast}"></div>

<script th:src="@{/js/pawcare-main.js}"></script>
<script>
    // Gestion de l'affichage du champ puce électronique
    const hasChipCheckbox = document.querySelector('input[name="hasChip"]');
    const chipNumberField = document.getElementById('chipNumberField');

    if (hasChipCheckbox) {
        hasChipCheckbox.addEventListener('change', function() {
            chipNumberField.style.display = this.checked ? 'block' : 'none';
        });
    }

    // Gestion de l'upload d'image pour les animaux perdus
    let lostSelectedImages = [];
    const lostUploadArea = document.getElementById('lostUploadArea');
    const lostImageUpload = document.getElementById('lostImageUpload');
    const lostImagePreview = document.getElementById('lostImagePreview');

    if (lostUploadArea) {
        lostUploadArea.addEventListener('click', () => lostImageUpload.click());

        lostUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            lostUploadArea.classList.add('dragover');
        });

        lostUploadArea.addEventListener('dragleave', () => {
            lostUploadArea.classList.remove('dragover');
        });

        lostUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            lostUploadArea.classList.remove('dragover');
            handleLostImageFiles(e.dataTransfer.files);
        });
    }

    if (lostImageUpload) {
        lostImageUpload.addEventListener('change', (e) => {
            handleLostImageFiles(e.target.files);
        });
    }

    function handleLostImageFiles(files) {
        for (let file of files) {
            if (!file.type.startsWith('image/')) {
                showToast('Format non supporté : ' + file.name);
                continue;
            }
            if (file.size > 5 * 1024 * 1024) {
                showToast('Fichier trop volumineux : ' + file.name);
                continue;
            }

            lostSelectedImages.push(file);

            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.createElement('div');
                preview.className = 'preview-image';
                preview.innerHTML = `
                    <img src="${e.target.result}" alt="Preview">
                    <button class="remove-image" onclick="removeLostImage(this, '${file.name}')">✕</button>
                `;
                lostImagePreview.appendChild(preview);
            };
            reader.readAsDataURL(file);
        }

        // Mettre à jour l'input file avec les fichiers sélectionnés
        updateLostFileInput();
    }

    function removeLostImage(button, fileName) {
        const previewDiv = button.parentElement;
        previewDiv.remove();
        lostSelectedImages = lostSelectedImages.filter(img => img.name !== fileName);
        updateLostFileInput();
    }

    function updateLostFileInput() {
        const dataTransfer = new DataTransfer();
        lostSelectedImages.forEach(file => dataTransfer.items.add(file));
        lostImageUpload.files = dataTransfer.files;
    }

    // Validation du formulaire avant envoi
    const lostForm = document.getElementById('lostReportForm');
    if (lostForm) {
        lostForm.addEventListener('submit', function(e) {
            const phone = document.querySelector('input[name="ownerPhone"]').value;
            const phoneRegex = /^(\+212|0)[0-9]{9}$/;

            if (!phone || !phoneRegex.test(phone)) {
                e.preventDefault();
                showToast('Numéro de téléphone invalide (ex: 0612345678 ou +212612345678)');
                return false;
            }

            showToast('Publication du signalement en cours...');
        });
    }
</script>
</body>
</html>
