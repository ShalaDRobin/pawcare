<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Modifier le signalement - PawCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pawcare-style.css}">
    <style>
        .edit-container { max-width: 800px; margin: 120px auto 60px; padding: 0 30px; }
        .edit-card { background: white; border-radius: 24px; padding: 40px; box-shadow: var(--shadow); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--forest); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .current-image { margin-top: 10px; }
        .current-image img { max-width: 200px; border-radius: 12px; }
        .btn-primary { background: var(--terracotta); color: white; border: none; padding: 14px 24px; border-radius: 50px; cursor: pointer; }
        .btn-outline { background: transparent; border: 2px solid var(--terracotta); color: var(--terracotta); padding: 14px 24px; border-radius: 50px; cursor: pointer; text-decoration: none; }
        .form-actions { display: flex; gap: 15px; margin-top: 30px; }
        .back-button { display: inline-flex; align-items: center; gap: 10px; color: var(--forest); text-decoration: none; margin-bottom: 20px; }
    </style>
</head>

<body>
<div th:replace="~{pawcare/fragments/navbar :: navbar}"></div>

<div class="edit-container">
    <a th:href="@{/perdus/{id}(id=${post.id})}" class="back-button">← Retour</a>

    <div class="edit-card">
        <h1>✏️ Modifier le signalement</h1>

        <form th:action="@{/perdus/{id}/edit(id=${post.id})}" method="post" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" name="title" th:value="${post.title}" required>
                </div>
                <div class="form-group">
                    <label>Type d'animal</label>
                    <select name="animalType" required>
                        <option value="Chien" th:selected="${post.animalType == 'Chien'}">🐕 Chien</option>
                        <option value="Chat" th:selected="${post.animalType == 'Chat'}">🐈 Chat</option>
                        <option value="Lapin" th:selected="${post.animalType == 'Lapin'}">🐇 Lapin</option>
                        <option value="Autre" th:selected="${post.animalType == 'Autre'}">🐾 Autre</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" name="name" th:value="${post.name}">
                </div>
                <div class="form-group">
                    <label>Race</label>
                    <input type="text" name="breed" th:value="${post.breed}">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Âge</label>
                    <input type="number" name="age" th:value="${post.age}">
                </div>
                <div class="form-group">
                    <label>Sexe</label>
                    <select name="gender">
                        <option value="" th:selected="${post.gender == null}">Non spécifié</option>
                        <option value="Mâle" th:selected="${post.gender == 'Mâle'}">Mâle</option>
                        <option value="Femelle" th:selected="${post.gender == 'Femelle'}">Femelle</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Couleur</label>
                    <input type="text" name="color" th:value="${post.color}">
                </div>
                <div class="form-group">
                    <label>Signes distinctifs</label>
                    <input type="text" name="distinctFeatures" th:value="${post.distinctFeatures}">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Lieu de disparition</label>
                    <input type="text" name="lastSeenLocation" th:value="${post.lastSeenLocation}" required>
                </div>
                <div class="form-group">
                    <label>Date de disparition</label>
                    <!-- ✅ CORRIGÉ : pas de #dates.format -->
                    <input type="date" name="lastSeenDate" th:value="${post.lastSeenDate}" required>
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4" required th:text="${post.description}"></textarea>
            </div>

            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" name="ownerPhone" th:value="${post.ownerPhone}" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="ownerEmail" th:value="${post.ownerEmail}">
            </div>

            <div class="form-group">
                <label>Nouvelle photo (optionnel)</label>
                <input type="file" name="images" accept="image/*">
                <div class="current-image" th:if="${post.imageUrl != null}">
                    <p>Photo actuelle :</p>
                    <img th:src="@{${post.imageUrl}}" alt="Photo actuelle">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">💾 Enregistrer</button>
                <a th:href="@{/perdus/{id}(id=${post.id})}" class="btn-outline">Annuler</a>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/pawcare-main.js}"></script>
</body>
</html>
