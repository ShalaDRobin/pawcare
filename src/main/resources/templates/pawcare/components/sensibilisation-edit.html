<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier l'article - PawCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pawcare-style.css}">
    <style>
        .form-container {
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 0 30px;
        }
        .form-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--forest);
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn-primary {
            background: var(--terracotta);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            flex: 2;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--terracotta);
            color: var(--terracotta);
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            text-align: center;
            text-decoration: none;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--forest);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .current-image {
            margin-top: 10px;
        }
        .current-image img {
            max-width: 200px;
            border-radius: 12px;
        }
        .tag-input {
            display: flex;
            gap: 10px;
        }
        .tag-input input { flex: 1; }
        .tag-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .tag-item {
            background: var(--cream);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tag-item .remove {
            cursor: pointer;
            color: var(--terracotta);
            font-weight: bold;
        }
    </style>
</head>

<body>
<div th:replace="~{pawcare/fragments/navbar :: navbar}"></div>

<div class="form-container">
    <a th:href="@{/sensibilisation/{id}(id=${article.id})}" class="back-button">← Retour à l'article</a>

    <div class="form-card">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 30px;">✏️ Modifier l'article</h1>

        <form th:action="@{/sensibilisation/{id}/edit(id=${article.id})}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>Titre de l'article *</label>
                <input type="text" name="title" th:value="${article.title}" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Catégorie *</label>
                    <select name="category" required>
                        <option value="Soins" th:selected="${article.category == 'Soins'}">⚕️ Soins</option>
                        <option value="Abandon" th:selected="${article.category == 'Abandon'}">🚫 Abandon</option>
                        <option value="Stérilisation" th:selected="${article.category == 'Stérilisation'}">✂️ Stérilisation</option>
                        <option value="Droits" th:selected="${article.category == 'Droits'}">🏛️ Droits des animaux</option>
                        <option value="Rue" th:selected="${article.category == 'Rue'}">🏘️ Animaux de rue</option>
                        <option value="Vaccins" th:selected="${article.category == 'Vaccins'}">💉 Vaccins</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Auteur</label>
                    <input type="text" name="author" th:value="${article.author}">
                </div>
            </div>

            <div class="form-group">
                <label>Résumé (optionnel)</label>
                <textarea name="summary" rows="2" th:text="${article.summary}"></textarea>
            </div>

            <div class="form-group">
                <label>Contenu *</label>
                <textarea name="content" rows="10" required th:text="${article.content}"></textarea>
            </div>

            <div class="form-group">
                <label>Nouvelle image (optionnel)</label>
                <input type="file" name="images" accept="image/*">
                <div class="current-image" th:if="${article.imageUrl != null and article.imageUrl != ''}">
                    <p>Image actuelle :</p>
                    <img th:src="@{${article.imageUrl}}" alt="Image actuelle">
                </div>
            </div>

            <div class="form-group">
                <label>Tags</label>
                <div class="tag-input">
                    <input type="text" id="tagInput" placeholder="Ex: santé, vaccination..." onkeydown="if(event.key==='Enter'){event.preventDefault();addTag();}">
                    <button type="button" class="btn btn-outline" onclick="addTag()" style="padding: 12px 20px;">Ajouter</button>
                </div>
                <div class="tag-list" id="tagList"></div>
                <input type="hidden" name="tags" id="tagsHidden">
            </div>

            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" name="isPublished" value="true" th:checked="${article.isPublished}">
                    Article publié
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">💾 Enregistrer les modifications</button>
                <a th:href="@{/sensibilisation/{id}(id=${article.id})}" class="btn-outline">Annuler</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{pawcare/fragments/footer :: footer}"></div>
<div th:replace="~{pawcare/fragments/toast :: toast}"></div>

<script th:src="@{/js/pawcare-main.js}"></script>
<script>
    let tags = [];
    const existingTags = [[${article.tags}]] || [];

    // Initialiser les tags existants
    if (existingTags && Array.isArray(existingTags)) {
        tags = [...existingTags];
        updateTagDisplay();
    }

    function addTag() {
        const input = document.getElementById('tagInput');
        const tag = input.value.trim();
        if (tag && !tags.includes(tag)) {
            tags.push(tag);
            updateTagDisplay();
            input.value = '';
        }
    }

    function removeTag(index) {
        tags.splice(index, 1);
        updateTagDisplay();
    }

    function updateTagDisplay() {
        const list = document.getElementById('tagList');
        list.innerHTML = tags.map((tag, i) =>
            `<span class="tag-item">${tag} <span class="remove" onclick="removeTag(${i})">×</span></span>`
        ).join('');
        document.getElementById('tagsHidden').value = tags.join(',');
    }
</script>
</body>
</html>
