<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'PawCare - ' + ${article.title}">PawCare - Article de sensibilisation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pawcare-style.css}">
    <style>
        .article-container {
            max-width: 900px;
            margin: 120px auto 60px;
            padding: 0 30px;
        }
        .article-card {
            background: white;
            border-radius: 24px;
            padding: 50px;
            box-shadow: var(--shadow);
        }
        .article-category {
            display: inline-block;
            padding: 5px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(196,107,63,0.1);
            color: var(--terracotta);
            margin-bottom: 15px;
        }
        .article-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--dark);
            margin-bottom: 15px;
            line-height: 1.2;
        }
        .article-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .article-image {
            width: 100%;
            height: 400px;
            border-radius: 16px;
            object-fit: cover;
            margin: 20px 0 30px;
        }
        .article-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text);
            white-space: pre-wrap;
        }
        .article-content p { margin-bottom: 20px; }
        .article-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            align-items: center;
        }
        .btn-like {
            background: transparent;
            border: 2px solid var(--terracotta);
            color: var(--terracotta);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }
        .btn-like:hover { background: var(--terracotta); color: white; }
        .owner-actions {
            display: flex;
            gap: 10px;
            margin-left: auto;
            flex-wrap: wrap;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--forest);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1rem;
        }
        .back-button:hover { color: var(--terracotta); }
        .related-articles { margin-top: 60px; }
        .related-articles h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 30px;
        }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .related-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .related-card:hover { transform: translateY(-3px); }
        .related-card h4 { color: var(--forest); margin-bottom: 5px; }
        .related-card p { color: var(--text-light); font-size: 0.9rem; }

        /* ✅ RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            .article-container {
                margin: 80px auto 40px;
                padding: 0 16px;
            }
            .article-card {
                padding: 24px 18px;
                border-radius: 16px;
            }
            .article-title { font-size: 1.7rem; }
            .article-meta {
                gap: 12px;
                font-size: 0.82rem;
            }
            .article-image {
                height: 220px;
                border-radius: 12px;
                margin: 14px 0 20px;
            }
            .article-content { font-size: 0.97rem; line-height: 1.75; }
            .article-actions {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .btn-like { width: 100%; text-align: center; }
            .owner-actions {
                margin-left: 0;
                width: 100%;
                flex-direction: column;
            }
            .owner-actions .btn { width: 100%; text-align: center; }
            .related-articles { margin-top: 36px; }
            .related-articles h3 { font-size: 1.3rem; margin-bottom: 16px; }
            .related-grid { grid-template-columns: 1fr; gap: 14px; }
        }
    </style>
</head>

<body>
<div th:replace="~{pawcare/fragments/navbar :: navbar}"></div>

<div class="article-container">
    <a href="/sensibilisation" class="back-button">← Retour aux articles</a>

    <div class="article-card">
        <span class="article-category" th:text="${article.category}">Soins</span>
        <h1 class="article-title" th:text="${article.title}">Titre de l'article</h1>

        <div class="article-meta">
            <span>✍️ <span th:text="${article.author}">Auteur</span></span>
            <span>📅 <span th:text="${#temporals.format(article.publishedAt, 'dd MMMM yyyy')}">Date</span></span>
            <span>👁️ <span th:text="${article.readCount}">0</span> lectures</span>
            <span>❤️ <span th:text="${article.likeCount}">0</span> likes</span>
            <span th:if="${article.tags != null and !article.tags.isEmpty()}">
                🏷️ <span th:each="tag : ${article.tags}" th:text="${tag} + ' '"></span>
            </span>
        </div>

        <div th:if="${article.imageUrl != null and article.imageUrl != ''}">
            <img th:src="@{${article.imageUrl}}" alt="Image de l'article" class="article-image">
        </div>

        <div class="article-content" th:text="${article.content}">Contenu de l'article...</div>

        <div class="article-actions">
            <button class="btn-like" onclick="likeArticle()">
                ❤️ Like (<span id="likeCount" th:text="${article.likeCount}">0</span>)
            </button>
            <div th:if="${isOwner}" class="owner-actions">
                <button class="btn btn-primary" onclick="editArticle()" style="padding:10px 20px;">✏️ Modifier</button>
                <button class="btn btn-outline" onclick="deleteArticle()"
                        style="padding:10px 20px; border-color:var(--terracotta); color:var(--terracotta);">🗑️ Supprimer</button>
                <button class="btn btn-outline" onclick="togglePublish()" style="padding:10px 20px;">
                    <span th:if="${article.isPublished}">📤 Dépublier</span>
                    <span th:unless="${article.isPublished}">📥 Publier</span>
                </button>
            </div>
        </div>
    </div>

    <div class="related-articles" th:if="${relatedArticles != null and !relatedArticles.isEmpty()}">
        <h3>📚 Vous aimerez aussi</h3>
        <div class="related-grid">
            <div class="related-card" th:each="related : ${relatedArticles}"
                 th:onclick="'window.location.href=\'/sensibilisation/' + ${related.id} + '\''">
                <h4 th:text="${related.title}">Titre</h4>
                <p th:text="${#strings.abbreviate(related.content, 80)}">Résumé...</p>
                <span style="font-size:0.8rem; color:var(--text-light);">👁️ <span th:text="${related.readCount}">0</span></span>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{pawcare/fragments/footer :: footer}"></div>
<div th:replace="~{pawcare/fragments/toast :: toast}"></div>
<script th:src="@{/js/pawcare-main.js}"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const articleId = /*[[${article.id}]]*/ null;
    /*]]>*/

    function likeArticle() {
        if (!window.isAuthenticated) { openModal('login'); return; }
        fetch('/sensibilisation/' + articleId + '/like', { method: 'POST', credentials: 'include' })
        .then(r => r.json())
        .then(data => {
            if (data.success) { showToast('❤️ Like ajouté !'); location.reload(); }
            else showToast('Erreur: ' + data.message);
        });
    }
    function editArticle() { window.location.href = '/sensibilisation/' + articleId + '/edit'; }
    function deleteArticle() {
        if (!confirm('Supprimer cet article ?')) return;
        fetch('/sensibilisation/' + articleId + '/delete', { method: 'POST', credentials: 'include' })
        .then(r => r.json())
        .then(data => {
            if (data.success) { showToast('✅ Article supprimé !'); setTimeout(() => window.location.href = '/sensibilisation', 1500); }
            else showToast('Erreur: ' + data.message);
        });
    }
    function togglePublish() {
        fetch('/sensibilisation/' + articleId + '/toggle-publish', { method: 'POST', credentials: 'include' })
        .then(r => r.json())
        .then(data => {
            if (data.success) { showToast('✅ Statut modifié !'); location.reload(); }
            else showToast('Erreur: ' + data.message);
        });
    }
</script>
</body>
</html>
