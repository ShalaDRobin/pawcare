<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes notifications - PawCare</title>
</head>
<body>
<div th:fragment="notifications">
    <div class="notifications-container">
        <div class="notifications-header">
            <h2>🔔 Mes notifications</h2>
            <button class="btn-small" onclick="markAllAsRead()">✅ Tout marquer comme lu</button>
        </div>

        <div th:if="${notifications.empty}" class="empty-state">
            <div class="emoji">📭</div>
            <p>Aucune notification pour le moment</p>
        </div>

        <div class="notifications-list">
            <div th:each="notif : ${notifications}" class="notification-item"
                 th:classappend="${!notif.isRead} ? 'unread' : ''"
                 th:data-id="${notif.id}">
                <div class="notification-icon" th:text="${getIcon(notif.type)}">🔔</div>
                <div class="notification-content">
                    <div class="notification-title" th:text="${notif.title}">Titre</div>
                    <div class="notification-message" th:text="${notif.message}">Message</div>
                    <div class="notification-time" th:text="${notif.timeAgo}">Il y a 2h</div>
                </div>
                <div class="notification-actions">
                    <button class="mark-read-btn" th:if="${!notif.isRead}"
                            onclick="markAsRead(${notif.id})">✓</button>
                    <button class="delete-btn" onclick="deleteNotification(${notif.id})">🗑️</button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .notifications-container {
            max-width: 800px;
            margin: 120px auto;
            padding: 20px;
        }
        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .notification-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .notification-item.unread {
            background: #fff8f0;
            border-left: 4px solid var(--terracotta);
        }
        .notification-icon {
            font-size: 1.5rem;
        }
        .notification-content {
            flex: 1;
        }
        .notification-title {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 5px;
        }
        .notification-message {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .notification-time {
            font-size: 0.8rem;
            color: #aaa;
        }
        .notification-actions {
            display: flex;
            gap: 5px;
            align-items: start;
        }
        .mark-read-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mark-read-btn:hover {
            background: #e8f5e9;
            color: #27ae60;
        }
        .delete-btn:hover {
            background: #fee;
            color: #e74c3c;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 24px;
        }
    </style>

    <script>
        function markAsRead(id) {
            fetch('/notifications/' + id + '/read', { method: 'POST' })
                .then(() => location.reload());
        }

        function markAllAsRead() {
            fetch('/notifications/read-all', { method: 'POST' })
                .then(() => location.reload());
        }

        function deleteNotification(id) {
            if (confirm('Supprimer cette notification ?')) {
                fetch('/notifications/' + id, { method: 'DELETE' })
                    .then(() => location.reload());
            }
        }

        function getIcon(type) {
            const icons = {
                'ADOPTION_REQUEST': '📨',
                'ADOPTION_RESPONSE': '📬',
                'LOST_ANIMAL_POSTED': '🔍',
                'LOST_ANIMAL_FOUND': '🎉',
                'LOST_ANIMAL_REMINDER': '⏰',
                'FORUM_REPLY': '💬',
                'CONTACT_MESSAGE': '📱',
                'SYSTEM': '🔔'
            };
            return icons[type] || '🔔';
        }
    </script>
</div>
</body>
</html>
