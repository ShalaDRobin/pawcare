<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes demandes - PawCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pawcare-style.css}">
    <style>
        .requests-container {
            max-width: 1200px;
            margin: 120px auto 60px;
            padding: 0 30px;
        }
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--dark);
            margin-bottom: 10px;
        }
        .page-header p {
            color: var(--text-light);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 10px 24px;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--terracotta);
            color: white;
        }
        .tab-btn:hover:not(.active) {
            background: var(--cream);
            color: var(--forest);
        }
        .requests-grid {
            display: grid;
            gap: 20px;
        }
        .request-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }
        .request-card:hover {
            transform: translateY(-2px);
        }
        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .animal-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .animal-avatar {
            width: 60px;
            height: 60px;
            background: var(--cream);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .animal-details h3 {
            font-size: 1.2rem;
            color: var(--forest);
            margin-bottom: 5px;
        }
        .animal-details p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin: 2px 0;
        }
        .status-badge {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-pending {
            background: #fff3e0;
            color: #e67e22;
        }
        .status-accepted {
            background: #e0f7e8;
            color: #27ae60;
        }
        .status-rejected {
            background: #fee;
            color: #e74c3c;
        }
        .status-cancelled {
            background: #f0f0f0;
            color: #7f8c8d;
        }
        .request-message {
            background: var(--cream);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            font-style: italic;
        }
        .request-message p {
            margin: 0;
            color: var(--dark);
        }
        .request-details {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        .btn-accept {
            background: #27ae60;
            color: white;
        }
        .btn-reject {
            background: #e74c3c;
            color: white;
        }
        .btn-view {
            background: var(--forest);
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 24px;
            color: var(--text-light);
        }
        .empty-state .emoji {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .response-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .response-modal.active {
            display: flex;
        }
        .response-modal-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
        }
        .response-modal-content h3 {
            margin-bottom: 20px;
        }
        .response-modal-content textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 20px;
            font-family: inherit;
        }
    </style>
</head>

<body>
<div th:replace="~{pawcare/fragments/navbar :: navbar}"></div>

<div class="requests-container">
    <div class="page-header">
        <h1>📋 Mes demandes</h1>
        <p>Suivez l'état de vos demandes d'adoption</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="pending">📌 En attente</button>
        <button class="tab-btn" data-tab="accepted">✅ Acceptées</button>
        <button class="tab-btn" data-tab="rejected">❌ Refusées</button>
        <button class="tab-btn" data-tab="cancelled">🚫 Annulées</button>
    </div>

    <div class="requests-grid" id="requestsGrid">
        <!-- Contenu chargé dynamiquement -->
        <div class="empty-state">
            <div class="emoji">🐾</div>
            <h3>Chargement...</h3>
        </div>
    </div>
</div>

<!-- Modal de réponse -->
<div id="responseModal" class="response-modal">
    <div class="response-modal-content">
        <h3>📝 Répondre à la demande</h3>
        <textarea id="ownerResponse" rows="4" placeholder="Ajoutez un message pour le demandeur..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button id="acceptBtn" class="btn-small btn-accept" style="flex:1">✅ Accepter</button>
            <button id="rejectBtn" class="btn-small btn-reject" style="flex:1">❌ Refuser</button>
            <button onclick="closeResponseModal()" class="btn-small" style="background:#ccc">Annuler</button>
        </div>
    </div>
</div>

<div th:replace="~{pawcare/fragments/footer :: footer}"></div>
<div th:replace="~{pawcare/fragments/toast :: toast}"></div>

<script th:src="@{/js/pawcare-main.js}"></script>
<script>
    let currentRequestId = null;

    // Chargement des demandes
    function loadRequests() {
        const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
        const url = '/api/adoption/my-requests?status=' + activeTab;

        fetch(url, {
            credentials: 'include',
            headers: { 'Accept': 'application/json' }
        })
        .then(response => response.json())
        .then(requests => {
            updateRequestsGrid(requests);
        })
        .catch(error => {
            console.error('Erreur:', error);
            document.getElementById('requestsGrid').innerHTML = `
                <div class="empty-state">
                    <div class="emoji">😢</div>
                    <h3>Erreur de chargement</h3>
                    <p>Impossible de charger vos demandes</p>
                </div>
            `;
        });
    }

    // Mettre à jour la grille
    function updateRequestsGrid(requests) {
        const grid = document.getElementById('requestsGrid');

        if (!requests || requests.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="emoji">🐾</div>
                    <h3>Aucune demande</h3>
                    <p>Vous n'avez pas encore de demandes d'adoption</p>
                    <a href="/" class="btn btn-primary" style="margin-top: 20px;">Explorer les annonces</a>
                </div>
            `;
            return;
        }

        grid.innerHTML = requests.map(request => createRequestCard(request)).join('');
    }

    // Créer une carte de demande
    function createRequestCard(request) {
        const statusClass = getStatusClass(request.status);
        const statusText = getStatusText(request.status);

        let actionButtons = '';
        if (request.status === 'PENDING') {
            actionButtons = `
                <div class="action-buttons">
                    <button class="btn-small btn-accept" onclick="openResponseModal(${request.id}, 'accept')">✅ Accepter</button>
                    <button class="btn-small btn-reject" onclick="openResponseModal(${request.id}, 'reject')">❌ Refuser</button>
                </div>
            `;
        }

        if (request.status === 'ACCEPTED') {
            actionButtons = `
                <div class="action-buttons">
                    <a href="/adoption/${request.adoptionPostId}" class="btn-small btn-view">👁️ Voir l'annonce</a>
                </div>
            `;
        }

        return `
            <div class="request-card">
                <div class="request-header">
                    <div class="animal-info">
                        <div class="animal-avatar">
                            ${getAnimalEmoji(request.animalType)}
                        </div>
                        <div class="animal-details">
                            <h3>${escapeHtml(request.adoptionPostTitle)}</h3>
                            <p>${escapeHtml(request.animalType)} • ${request.age || '?'} ans • ${escapeHtml(request.location)}</p>
                        </div>
                    </div>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                </div>

                <div class="request-message">
                    <strong>💬 Votre message :</strong>
                    <p>"${escapeHtml(request.message)}"</p>
                </div>

                <div class="request-details">
                    <div class="detail-item">📞 ${escapeHtml(request.phoneNumber)}</div>
                    ${request.livingSituation ? `<div class="detail-item">🏠 ${escapeHtml(request.livingSituation)}</div>` : ''}
                    ${request.hasOtherPets ? `<div class="detail-item">🐕 A d'autres animaux</div>` : ''}
                    ${request.hasChildren ? `<div class="detail-item">👶 A des enfants</div>` : ''}
                </div>

                ${request.ownerResponse ? `
                    <div class="request-message" style="background: #e8f5e9;">
                        <strong>📨 Réponse du propriétaire :</strong>
                        <p>"${escapeHtml(request.ownerResponse)}"</p>
                    </div>
                ` : ''}

                ${actionButtons}
            </div>
        `;
    }

    // Ouvrir le modal de réponse
    function openResponseModal(requestId, action) {
        currentRequestId = requestId;
        const modal = document.getElementById('responseModal');
        const textarea = document.getElementById('ownerResponse');
        textarea.value = '';

        const acceptBtn = document.getElementById('acceptBtn');
        const rejectBtn = document.getElementById('rejectBtn');

        if (action === 'accept') {
            acceptBtn.onclick = () => respondToRequest(requestId, 'ACCEPT');
        } else {
            rejectBtn.onclick = () => respondToRequest(requestId, 'REJECT');
        }

        modal.classList.add('active');
    }

    // Répondre à une demande
    function respondToRequest(requestId, status) {
        const response = document.getElementById('ownerResponse').value;

        fetch('/api/adoption/request/' + requestId + '/respond', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                status: status,
                response: response
            }),
            credentials: 'include'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                closeResponseModal();
                showToast(data.message);
                loadRequests(); // Recharger la liste
            } else {
                showToast('Erreur: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Erreur:', error);
            showToast('Erreur lors de la réponse');
        });
    }

    function closeResponseModal() {
        document.getElementById('responseModal').classList.remove('active');
        currentRequestId = null;
    }

    function getStatusClass(status) {
        switch(status) {
            case 'PENDING': return 'status-pending';
            case 'ACCEPTED': return 'status-accepted';
            case 'REJECTED': return 'status-rejected';
            case 'CANCELLED': return 'status-cancelled';
            default: return '';
        }
    }

    function getStatusText(status) {
        switch(status) {
            case 'PENDING': return '📌 En attente';
            case 'ACCEPTED': return '✅ Acceptée';
            case 'REJECTED': return '❌ Refusée';
            case 'CANCELLED': return '🚫 Annulée';
            default: return status;
        }
    }

    function getAnimalEmoji(animalType) {
        switch(animalType) {
            case 'Chien': return '🐕';
            case 'Chat': return '🐈';
            case 'Lapin': return '🐇';
            case 'Oiseau': return '🦜';
            default: return '🐾';
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Gestion des onglets
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            loadRequests();
        });
    });

    // Chargement initial
    document.addEventListener('DOMContentLoaded', function() {
        loadRequests();
    });
</script>
</body>
</html>
