# ===========================================
# SERVER CONFIGURATION
# ===========================================
server.port=8080

# ===========================================
# DATABASE CONFIGURATION
# ===========================================
spring.datasource.url=jdbc:mysql://localhost:3306/pawcare_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=sarah
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================================
# JPA / HIBERNATE
# ===========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# THYMELEAF
# ===========================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ===========================================
# STATIC RESOURCES - ? AJOUT DU DOSSIER UPLOADS
# ===========================================
# Ajouter le dossier uploads pour servir les images
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.web.resources.cache.period=0

# ===========================================
# MULTIPART FILE UPLOAD - ? CONFIGURATION POUR LES IMAGES
# ===========================================
# Taille maximale des fichiers uploades
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Activer l'upload
spring.servlet.multipart.enabled=true
# Emplacement temporaire pour les uploads
spring.servlet.multipart.location=uploads/temp

# ===========================================
# LOGGING
# ===========================================
logging.level.com.pawcare=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===========================================
# MAIL CONFIGURATION (a configurer avec vos identifiants)
# ===========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=votre.email@gmail.com
spring.mail.password=votre-mot-de-passe
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000